services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: lms
      POSTGRES_DB: lms
    ports:
      - "5432:5432"
    volumes:
      - lms_db:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://lms:lms@db:5432/lms?schema=public
      JWT_SECRET: dev_secret
      PORT: 3000
      CORS_ORIGIN: http://localhost:5173
      NODE_ENV: development
    ports:
      - "3000:3000"

volumes:
  lms_db:
